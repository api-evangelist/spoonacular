    - name: talk-chatbot
      description: Talk to Chatbot
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-misc.talkToChatbot
      with:
        text: tools.text
        contextId: tools.contextId
      outputParameters:
      - type: object
        mapping: $.
    - name: conversation-suggests
      description: Conversation Suggests
      hints:
        readOnly: true
