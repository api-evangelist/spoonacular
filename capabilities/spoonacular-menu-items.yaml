naftiko: 1.0.0-alpha2
info:
  label: spoonacular API — Menu Items
  description: 'Menu Items surface of the Spoonacular Food API. 8 operations. Lead operation: Autocomplete Menu Item Search. Self-contained Naftiko capability covering one Spoonacular business surface.'
  tags:
  - Spoonacular
  - Food
  - Menu Items
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SPOONACULAR_API_KEY: SPOONACULAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: spoonacular-menu-items
    baseUri: https://api.spoonacular.com
    description: spoonacular API — Menu Items business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.SPOONACULAR_API_KEY}}'
      placement: header
    resources:
    - name: food-menuitems-suggest
      path: /food/menuItems/suggest
      operations:
      - name: autocompleteMenuItemSearch
        method: GET
        description: Autocomplete Menu Item Search
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
          description: The (partial) search query.
        - name: number
          in: query
          type: integer
          required: false
          description: The number of results to return (between 1 and 25).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-menuitems-search
      path: /food/menuItems/search
      operations:
      - name: searchMenuItems
        method: GET
        description: Search Menu Items
        inputParameters:
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: minCalories
          in: query
          type: number
          required: false
          description: The minimum amount of calories the menu item must have.
        - name: maxCalories
          in: query
          type: number
          required: false
          description: The maximum amount of calories the menu item can have.
        - name: minCarbs
          in: query
          type: number
          required: false
          description: The minimum amount of carbohydrates in grams the menu item must have.
        - name: maxCarbs
          in: query
          type: number
          required: false
          description: The maximum amount of carbohydrates in grams the menu item can have.
        - name: minProtein
          in: query
          type: number
          required: false
          description: The minimum amount of protein in grams the menu item must have.
        - name: maxProtein
          in: query
          type: number
          required: false
          description: The maximum amount of protein in grams the menu item can have.
        - name: minFat
          in: query
          type: number
          required: false
          description: The minimum amount of fat in grams the menu item must have.
        - name: maxFat
          in: query
          type: number
          required: false
          description: The maximum amount of fat in grams the menu item can have.
        - name: addMenuItemInformation
          in: query
          type: boolean
          required: false
          description: If set to true, you get more information about the menu items returned.
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: null
          in: null
          type: string
          required: false
          description: null
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-menuitems-id
      path: /food/menuItems/{id}
      operations:
      - name: getMenuItemInformation
        method: GET
        description: Get Menu Item Information
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The menu item id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-menuitems-id-nutritionwidget
      path: /food/menuItems/{id}/nutritionWidget
      operations:
      - name: visualizeMenuItemNutritionByID
        method: GET
        description: Menu Item Nutrition by ID Widget
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The menu item id.
        - name: null
          in: null
          type: string
          required: false
          description: null
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-menuitems-id-nutritionwidget-png
      path: /food/menuItems/{id}/nutritionWidget.png
      operations:
      - name: menuItemNutritionByIDImage
        method: GET
        description: Menu Item Nutrition by ID Image
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The menu item id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-menuitems-id-nutritionlabel
      path: /food/menuItems/{id}/nutritionLabel
      operations:
      - name: menuItemNutritionLabelWidget
        method: GET
        description: Menu Item Nutrition Label Widget
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The menu item id.
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: showOptionalNutrients
          in: query
          type: boolean
          required: false
          description: Whether to show optional nutrients.
        - name: showZeroValues
          in: query
          type: boolean
          required: false
          description: Whether to show zero values.
        - name: showIngredients
          in: query
          type: boolean
          required: false
          description: Whether to show a list of ingredients.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-menuitems-id-nutritionlabel-png
      path: /food/menuItems/{id}/nutritionLabel.png
      operations:
      - name: menuItemNutritionLabelImage
        method: GET
        description: Menu Item Nutrition Label Image
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The menu item id.
        - name: showOptionalNutrients
          in: query
          type: boolean
          required: false
          description: Whether to show optional nutrients.
        - name: showZeroValues
          in: query
          type: boolean
          required: false
          description: Whether to show zero values.
        - name: showIngredients
          in: query
          type: boolean
          required: false
          description: Whether to show a list of ingredients.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-restaurants-search
      path: /food/restaurants/search
      operations:
      - name: searchRestaurants
        method: GET
        description: Search Restaurants
        inputParameters:
        - name: query
          in: query
          type: string
          required: false
          description: The search query.
        - name: lat
          in: query
          type: number
          required: false
          description: The latitude of the user's location.
        - name: lng
          in: query
          type: number
          required: false
          description: The longitude of the user's location.".
        - name: distance
          in: query
          type: number
          required: false
          description: The distance around the location in miles.
        - name: budget
          in: query
          type: number
          required: false
          description: The user's budget for a meal in USD.
        - name: cuisine
          in: query
          type: string
          required: false
          description: The cuisine of the restaurant.
        - name: min-rating
          in: query
          type: number
          required: false
          description: The minimum rating of the restaurant between 0 and 5.
        - name: is-open
          in: query
          type: boolean
          required: false
          description: Whether the restaurant must be open at the time of search.
        - name: sort
          in: query
          type: string
          required: false
          description: How to sort the results, one of the following 'cheapest', 'fastest', 'rating', 'distance' or the default 'relevance'.
        - name: page
          in: query
          type: number
          required: false
          description: The page number of results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: spoonacular-menu-items-rest
    port: 8080
    description: REST adapter for spoonacular API — Menu Items. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/food/menu-items/suggest
      name: food-menuitems-suggest
      description: REST surface for food-menuitems-suggest.
      operations:
      - method: GET
        name: autocompleteMenuItemSearch
        description: Autocomplete Menu Item Search
        call: spoonacular-menu-items.autocompleteMenuItemSearch
        with:
          query: rest.query
          number: rest.number
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/menu-items/search
      name: food-menuitems-search
      description: REST surface for food-menuitems-search.
      operations:
      - method: GET
        name: searchMenuItems
        description: Search Menu Items
        call: spoonacular-menu-items.searchMenuItems
        with:
          null: rest.None
          minCalories: rest.minCalories
          maxCalories: rest.maxCalories
          minCarbs: rest.minCarbs
          maxCarbs: rest.maxCarbs
          minProtein: rest.minProtein
          maxProtein: rest.maxProtein
          minFat: rest.minFat
          maxFat: rest.maxFat
          addMenuItemInformation: rest.addMenuItemInformation
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/menu-items/{id}
      name: food-menuitems-id
      description: REST surface for food-menuitems-id.
      operations:
      - method: GET
        name: getMenuItemInformation
        description: Get Menu Item Information
        call: spoonacular-menu-items.getMenuItemInformation
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/menu-items/{id}/nutrition-widget
      name: food-menuitems-id-nutritionwidget
      description: REST surface for food-menuitems-id-nutritionwidget.
      operations:
      - method: GET
        name: visualizeMenuItemNutritionByID
        description: Menu Item Nutrition by ID Widget
        call: spoonacular-menu-items.visualizeMenuItemNutritionByID
        with:
          id: rest.id
          null: rest.None
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/menu-items/{id}/nutrition-widget-png
      name: food-menuitems-id-nutritionwidget-png
      description: REST surface for food-menuitems-id-nutritionwidget-png.
      operations:
      - method: GET
        name: menuItemNutritionByIDImage
        description: Menu Item Nutrition by ID Image
        call: spoonacular-menu-items.menuItemNutritionByIDImage
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/menu-items/{id}/nutrition-label
      name: food-menuitems-id-nutritionlabel
      description: REST surface for food-menuitems-id-nutritionlabel.
      operations:
      - method: GET
        name: menuItemNutritionLabelWidget
        description: Menu Item Nutrition Label Widget
        call: spoonacular-menu-items.menuItemNutritionLabelWidget
        with:
          id: rest.id
          null: rest.None
          showOptionalNutrients: rest.showOptionalNutrients
          showZeroValues: rest.showZeroValues
          showIngredients: rest.showIngredients
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/menu-items/{id}/nutrition-label-png
      name: food-menuitems-id-nutritionlabel-png
      description: REST surface for food-menuitems-id-nutritionlabel-png.
      operations:
      - method: GET
        name: menuItemNutritionLabelImage
        description: Menu Item Nutrition Label Image
        call: spoonacular-menu-items.menuItemNutritionLabelImage
        with:
          id: rest.id
          showOptionalNutrients: rest.showOptionalNutrients
          showZeroValues: rest.showZeroValues
          showIngredients: rest.showIngredients
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/restaurants/search
      name: food-restaurants-search
      description: REST surface for food-restaurants-search.
      operations:
      - method: GET
        name: searchRestaurants
        description: Search Restaurants
        call: spoonacular-menu-items.searchRestaurants
        with:
          query: rest.query
          lat: rest.lat
          lng: rest.lng
          distance: rest.distance
          budget: rest.budget
          cuisine: rest.cuisine
          min-rating: rest.min-rating
          is-open: rest.is-open
          sort: rest.sort
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spoonacular-menu-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for spoonacular API — Menu Items. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: autocomplete-menu-item-search
      description: Autocomplete Menu Item Search
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-menu-items.autocompleteMenuItemSearch
      with:
        query: tools.query
        number: tools.number
      outputParameters:
      - type: object
        mapping: $.
    - name: search-menu-items
      description: Search Menu Items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-menu-items.searchMenuItems
      with:
        null: tools.None
        minCalories: tools.minCalories
        maxCalories: tools.maxCalories
        minCarbs: tools.minCarbs
        maxCarbs: tools.maxCarbs
        minProtein: tools.minProtein
        maxProtein: tools.maxProtein
        minFat: tools.minFat
        maxFat: tools.maxFat
        addMenuItemInformation: tools.addMenuItemInformation
      outputParameters:
      - type: object
        mapping: $.
    - name: get-menu-item-information
      description: Get Menu Item Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-menu-items.getMenuItemInformation
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: menu-item-nutrition-id-widget
      description: Menu Item Nutrition by ID Widget
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-menu-items.visualizeMenuItemNutritionByID
      with:
        id: tools.id
        null: tools.None
      outputParameters:
      - type: object
        mapping: $.
    - name: menu-item-nutrition-id-image
      description: Menu Item Nutrition by ID Image
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-menu-items.menuItemNutritionByIDImage
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: menu-item-nutrition-label-widget
      description: Menu Item Nutrition Label Widget
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-menu-items.menuItemNutritionLabelWidget
      with:
        id: tools.id
        null: tools.None
        showOptionalNutrients: tools.showOptionalNutrients
        showZeroValues: tools.showZeroValues
        showIngredients: tools.showIngredients
      outputParameters:
      - type: object
        mapping: $.
    - name: menu-item-nutrition-label-image
      description: Menu Item Nutrition Label Image
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-menu-items.menuItemNutritionLabelImage
      with:
        id: tools.id
        showOptionalNutrients: tools.showOptionalNutrients
        showZeroValues: tools.showZeroValues
        showIngredients: tools.showIngredients
      outputParameters:
      - type: object
        mapping: $.
    - name: search-restaurants
      description: Search Restaurants
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-menu-items.searchRestaurants
      with:
        query: tools.query
        lat: tools.lat
        lng: tools.lng
        distance: tools.distance
        budget: tools.budget
        cuisine: tools.cuisine
        min-rating: tools.min-rating
        is-open: tools.is-open
        sort: tools.sort
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
