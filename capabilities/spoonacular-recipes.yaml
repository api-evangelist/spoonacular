  exposes:
  - type: rest
    namespace: spoonacular-recipes-rest
    port: 8080
    description: REST adapter for spoonacular API — Recipes. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/recipes/complex-search
      name: recipes-complexsearch
      description: REST surface for recipes-complexsearch.
      operations:
      - method: GET
        name: searchRecipes
        description: Search Recipes
        call: spoonacular-recipes.searchRecipes
        with:
          null: rest.None
          cuisine: rest.cuisine
          excludeCuisine: rest.excludeCuisine
          diet: rest.diet
          intolerances: rest.intolerances
          equipment: rest.equipment
          includeIngredients: rest.includeIngredients
          excludeIngredients: rest.excludeIngredients
          type: rest.type
          instructionsRequired: rest.instructionsRequired
          fillIngredients: rest.fillIngredients
          addRecipeInformation: rest.addRecipeInformation
          addRecipeNutrition: rest.addRecipeNutrition
          author: rest.author
          recipeBoxId: rest.recipeBoxId
          titleMatch: rest.titleMatch
          maxReadyTime: rest.maxReadyTime
          minServings: rest.minServings
          maxServings: rest.maxServings
          sort: rest.sort
          sortDirection: rest.sortDirection
          minCarbs: rest.minCarbs
          maxCarbs: rest.maxCarbs
          minProtein: rest.minProtein
          maxProtein: rest.maxProtein
          minCalories: rest.minCalories
          maxCalories: rest.maxCalories
          minFat: rest.minFat
          maxFat: rest.maxFat
          minAlcohol: rest.minAlcohol
          maxAlcohol: rest.maxAlcohol
          minCaffeine: rest.minCaffeine
          maxCaffeine: rest.maxCaffeine
          minCopper: rest.minCopper
          maxCopper: rest.maxCopper
          minCalcium: rest.minCalcium
          maxCalcium: rest.maxCalcium
          minCholine: rest.minCholine
          maxCholine: rest.maxCholine
          minCholesterol: rest.minCholesterol
          maxCholesterol: rest.maxCholesterol
          minFluoride: rest.minFluoride
          maxFluoride: rest.maxFluoride
          minSaturatedFat: rest.minSaturatedFat
