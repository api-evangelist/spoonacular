naftiko: 1.0.0-alpha2
info:
  label: spoonacular API — Recipes
  description: 'Recipes surface of the Spoonacular Food API. 42 operations. Lead operation: Search Recipes. Self-contained Naftiko capability covering one Spoonacular business surface.'
