    transport: http
    description: MCP adapter for spoonacular API — Recipes. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: search-recipes
      description: Search Recipes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-recipes.searchRecipes
      with:
        null: tools.None
        cuisine: tools.cuisine
        excludeCuisine: tools.excludeCuisine
        diet: tools.diet
        intolerances: tools.intolerances
        equipment: tools.equipment
        includeIngredients: tools.includeIngredients
        excludeIngredients: tools.excludeIngredients
        type: tools.type
        instructionsRequired: tools.instructionsRequired
        fillIngredients: tools.fillIngredients
        addRecipeInformation: tools.addRecipeInformation
        addRecipeNutrition: tools.addRecipeNutrition
        author: tools.author
        recipeBoxId: tools.recipeBoxId
        titleMatch: tools.titleMatch
        maxReadyTime: tools.maxReadyTime
        minServings: tools.minServings
        maxServings: tools.maxServings
        sort: tools.sort
        sortDirection: tools.sortDirection
        minCarbs: tools.minCarbs
        maxCarbs: tools.maxCarbs
        minProtein: tools.minProtein
        maxProtein: tools.maxProtein
        minCalories: tools.minCalories
        maxCalories: tools.maxCalories
        minFat: tools.minFat
        maxFat: tools.maxFat
        minAlcohol: tools.minAlcohol
        maxAlcohol: tools.maxAlcohol
        minCaffeine: tools.minCaffeine
        maxCaffeine: tools.maxCaffeine
        minCopper: tools.minCopper
        maxCopper: tools.maxCopper
        minCalcium: tools.minCalcium
        maxCalcium: tools.maxCalcium
        minCholine: tools.minCholine
        maxCholine: tools.maxCholine
        minCholesterol: tools.minCholesterol
        maxCholesterol: tools.maxCholesterol
        minFluoride: tools.minFluoride
        maxFluoride: tools.maxFluoride
        minSaturatedFat: tools.minSaturatedFat
        maxSaturatedFat: tools.maxSaturatedFat
        minVitaminA: tools.minVitaminA
        maxVitaminA: tools.maxVitaminA
        minVitaminC: tools.minVitaminC
        maxVitaminC: tools.maxVitaminC
