  - type: mcp
    namespace: spoonacular-ingredients-mcp
    port: 9090
    transport: http
    description: MCP adapter for spoonacular API — Ingredients. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: ingredients-id-image
      description: Ingredients by ID Image
