        destructive: false
        idempotent: false
      call: spoonacular-ingredients.visualizeIngredients
      with:
        null: tools.None
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ingredient-information
      description: Get Ingredient Information
      hints:
