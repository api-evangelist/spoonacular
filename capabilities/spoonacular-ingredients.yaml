naftiko: 1.0.0-alpha2
info:
  label: spoonacular API — Ingredients
  description: 'Ingredients surface of the Spoonacular Food API. 9 operations. Lead operation: Ingredients by ID Image. Self-contained Naftiko capability covering one Spoonacular business surface.'
  tags:
  - Spoonacular
  - Food
  - Ingredients
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SPOONACULAR_API_KEY: SPOONACULAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: spoonacular-ingredients
    baseUri: https://api.spoonacular.com
    description: spoonacular API — Ingredients business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.SPOONACULAR_API_KEY}}'
      placement: header
    resources:
    - name: recipes-id-ingredientwidget-png
      path: /recipes/{id}/ingredientWidget.png
      operations:
      - name: ingredientsByIDImage
        method: GET
        description: Ingredients by ID Image
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The recipe id.
        - name: measure
          in: query
          type: string
          required: false
          description: Whether the the measures should be 'us' or 'metric'.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: recipes-visualizeingredients
      path: /recipes/visualizeIngredients
      operations:
      - name: visualizeIngredients
        method: POST
        description: Ingredients Widget
        inputParameters:
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-ingredients-id-information
      path: /food/ingredients/{id}/information
      operations:
      - name: getIngredientInformation
        method: GET
        description: Get Ingredient Information
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The ingredient id.
        - name: amount
          in: query
          type: number
          required: false
          description: The amount of this ingredient.
        - name: unit
          in: query
          type: string
          required: false
          description: The unit for the given amount.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-ingredients-id-amount
      path: /food/ingredients/{id}/amount
      operations:
      - name: computeIngredientAmount
        method: GET
        description: Compute Ingredient Amount
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The id of the ingredient you want the amount for.
        - name: nutrient
          in: query
          type: string
          required: true
          description: The target nutrient. See a list of supported nutrients.
        - name: target
          in: query
          type: integer
          required: true
          description: The target number of the given nutrient.
        - name: unit
          in: query
          type: string
          required: false
          description: The target unit.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-ingredients-autocomplete
      path: /food/ingredients/autocomplete
      operations:
      - name: autocompleteIngredientSearch
        method: GET
        description: Autocomplete Ingredient Search
        inputParameters:
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: metaInformation
          in: query
          type: boolean
          required: false
          description: Whether to return more meta information about the ingredients.
        - name: intolerances
          in: query
          type: string
          required: false
          description: 'A comma-separated list of intolerances. All recipes returned must not contain ingredients that are not suitable for people with the intolerances entered. See a '
        - name: null
          in: null
          type: string
          required: false
          description: null
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-ingredients-search
      path: /food/ingredients/search
      operations:
      - name: ingredientSearch
        method: GET
        description: Ingredient Search
        inputParameters:
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: addChildren
          in: query
          type: boolean
          required: false
          description: Whether to add children of found foods.
        - name: minProteinPercent
          in: query
          type: number
          required: false
          description: The minimum percentage of protein the food must have (between 0 and 100).
        - name: maxProteinPercent
          in: query
          type: number
          required: false
          description: The maximum percentage of protein the food can have (between 0 and 100).
        - name: minFatPercent
          in: query
          type: number
          required: false
          description: The minimum percentage of fat the food must have (between 0 and 100).
        - name: maxFatPercent
          in: query
          type: number
          required: false
          description: The maximum percentage of fat the food can have (between 0 and 100).
        - name: minCarbsPercent
          in: query
          type: number
          required: false
          description: The minimum percentage of carbs the food must have (between 0 and 100).
        - name: maxCarbsPercent
          in: query
          type: number
          required: false
          description: The maximum percentage of carbs the food can have (between 0 and 100).
        - name: metaInformation
          in: query
          type: boolean
          required: false
          description: Whether to return more meta information about the ingredients.
        - name: intolerances
          in: query
          type: string
          required: false
          description: 'A comma-separated list of intolerances. All recipes returned must not contain ingredients that are not suitable for people with the intolerances entered. See a '
        - name: sort
          in: query
          type: string
          required: false
          description: The strategy to sort recipes by. See a full list of supported sorting options.
        - name: sortDirection
          in: query
          type: string
          required: false
          description: The direction in which to sort. Must be either 'asc' (ascending) or 'desc' (descending).
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: null
          in: null
          type: string
          required: false
          description: null
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-ingredients-substitutes
      path: /food/ingredients/substitutes
      operations:
      - name: getIngredientSubstitutes
        method: GET
        description: Get Ingredient Substitutes
        inputParameters:
        - name: ingredientName
          in: query
          type: string
          required: true
          description: The name of the ingredient you want to replace.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-ingredients-id-substitutes
      path: /food/ingredients/{id}/substitutes
      operations:
      - name: getIngredientSubstitutesByID
        method: GET
        description: Get Ingredient Substitutes by ID
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The id of the ingredient you want substitutes for.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-ingredients-map
      path: /food/ingredients/map
      operations:
      - name: mapIngredientsToGroceryProducts
        method: POST
        description: Map Ingredients to Grocery Products
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: spoonacular-ingredients-rest
    port: 8080
    description: REST adapter for spoonacular API — Ingredients. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
