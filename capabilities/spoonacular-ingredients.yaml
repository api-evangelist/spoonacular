      name: recipes-id-ingredientwidget-png
      description: REST surface for recipes-id-ingredientwidget-png.
      operations:
      - method: GET
        name: ingredientsByIDImage
        description: Ingredients by ID Image
        call: spoonacular-ingredients.ingredientsByIDImage
        with:
          id: rest.id
          measure: rest.measure
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recipes/visualize-ingredients
      name: recipes-visualizeingredients
      description: REST surface for recipes-visualizeingredients.
      operations:
      - method: POST
        name: visualizeIngredients
        description: Ingredients Widget
        call: spoonacular-ingredients.visualizeIngredients
        with:
          null: rest.None
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/ingredients/{id}/information
      name: food-ingredients-id-information
      description: REST surface for food-ingredients-id-information.
      operations:
      - method: GET
