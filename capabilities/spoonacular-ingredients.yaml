      description: REST surface for food-ingredients-id-amount.
      operations:
      - method: GET
        name: computeIngredientAmount
        description: Compute Ingredient Amount
        call: spoonacular-ingredients.computeIngredientAmount
        with:
          id: rest.id
          nutrient: rest.nutrient
          target: rest.target
          unit: rest.unit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/ingredients/autocomplete
      name: food-ingredients-autocomplete
      description: REST surface for food-ingredients-autocomplete.
      operations:
      - method: GET
        name: autocompleteIngredientSearch
        description: Autocomplete Ingredient Search
        call: spoonacular-ingredients.autocompleteIngredientSearch
        with:
          null: rest.None
          metaInformation: rest.metaInformation
          intolerances: rest.intolerances
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/ingredients/search
      name: food-ingredients-search
      description: REST surface for food-ingredients-search.
      operations:
      - method: GET
        name: ingredientSearch
        description: Ingredient Search
        call: spoonacular-ingredients.ingredientSearch
        with:
          null: rest.None
          addChildren: rest.addChildren
          minProteinPercent: rest.minProteinPercent
          maxProteinPercent: rest.maxProteinPercent
          minFatPercent: rest.minFatPercent
          maxFatPercent: rest.maxFatPercent
          minCarbsPercent: rest.minCarbsPercent
          maxCarbsPercent: rest.maxCarbsPercent
          metaInformation: rest.metaInformation
          intolerances: rest.intolerances
          sort: rest.sort
          sortDirection: rest.sortDirection
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/ingredients/substitutes
      name: food-ingredients-substitutes
      description: REST surface for food-ingredients-substitutes.
      operations:
      - method: GET
        name: getIngredientSubstitutes
        description: Get Ingredient Substitutes
        call: spoonacular-ingredients.getIngredientSubstitutes
        with:
          ingredientName: rest.ingredientName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/ingredients/{id}/substitutes
      name: food-ingredients-id-substitutes
      description: REST surface for food-ingredients-id-substitutes.
      operations:
      - method: GET
        name: getIngredientSubstitutesByID
        description: Get Ingredient Substitutes by ID
        call: spoonacular-ingredients.getIngredientSubstitutesByID
        with:
          id: rest.id
        outputParameters:
