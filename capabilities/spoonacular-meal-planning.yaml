naftiko: 1.0.0-alpha2
info:
  label: spoonacular API — Meal Planning
  description: 'Meal Planning surface of the Spoonacular Food API. 14 operations. Lead operation: Generate Meal Plan. Self-contained Naftiko capability covering one Spoonacular business surface.'
  tags:
  - Spoonacular
  - Food
  - Meal Planning
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SPOONACULAR_API_KEY: SPOONACULAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: spoonacular-meal-planning
    baseUri: https://api.spoonacular.com
    description: spoonacular API — Meal Planning business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.SPOONACULAR_API_KEY}}'
      placement: header
    resources:
    - name: mealplanner-generate
      path: /mealplanner/generate
      operations:
      - name: generateMealPlan
        method: GET
        description: Generate Meal Plan
        inputParameters:
        - name: timeFrame
          in: query
          type: string
          required: false
          description: Either for one "day" or an entire "week".
        - name: targetCalories
          in: query
          type: number
          required: false
          description: What is the caloric target for one day? The meal plan generator will try to get as close as possible to that goal.
        - name: diet
          in: query
          type: string
          required: false
          description: Enter a diet that the meal plan has to adhere to. See a full list of supported diets.
        - name: exclude
          in: query
          type: string
          required: false
          description: A comma-separated list of allergens or ingredients that must be excluded.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mealplanner-username-week-start-date
      path: /mealplanner/{username}/week/{start_date}
      operations:
      - name: getMealPlanWeek
        method: GET
        description: Get Meal Plan Week
        inputParameters:
        - name: username
          in: path
          type: string
          required: true
          description: The username.
        - name: start_date
          in: path
          type: string
          required: true
          description: The start date of the meal planned week in the format yyyy-mm-dd.
        - name: null
          in: null
          type: string
          required: false
          description: null
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mealplanner-username-day-date
      path: /mealplanner/{username}/day/{date}
      operations:
      - name: clearMealPlanDay
        method: DELETE
        description: Clear Meal Plan Day
        inputParameters:
        - name: username
          in: path
          type: string
          required: true
          description: The username.
        - name: date
          in: path
          type: string
          required: true
          description: The date in the format yyyy-mm-dd.
        - name: null
          in: null
          type: string
          required: false
          description: null
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mealplanner-username-items
      path: /mealplanner/{username}/items
      operations:
      - name: addToMealPlan
        method: POST
        description: Add to Meal Plan
        inputParameters:
        - name: username
          in: path
          type: string
          required: true
          description: The username.
        - name: null
          in: null
          type: string
          required: false
          description: null
