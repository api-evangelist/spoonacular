naftiko: 1.0.0-alpha2
info:
  label: spoonacular API — Products
  description: 'Products surface of the Spoonacular Food API. 11 operations. Lead operation: Search Grocery Products. Self-contained Naftiko capability covering one Spoonacular business surface.'
  tags:
  - Spoonacular
  - Food
  - Products
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SPOONACULAR_API_KEY: SPOONACULAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: spoonacular-products
    baseUri: https://api.spoonacular.com
    description: spoonacular API — Products business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.SPOONACULAR_API_KEY}}'
      placement: header
    resources:
    - name: food-products-search
      path: /food/products/search
      operations:
      - name: searchGroceryProducts
        method: GET
        description: Search Grocery Products
        inputParameters:
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: minCalories
          in: query
          type: number
          required: false
          description: The minimum amount of calories the product must have.
        - name: maxCalories
          in: query
          type: number
          required: false
          description: The maximum amount of calories the product can have.
        - name: minCarbs
          in: query
          type: number
          required: false
          description: The minimum amount of carbohydrates in grams the product must have.
        - name: maxCarbs
          in: query
          type: number
          required: false
          description: The maximum amount of carbohydrates in grams the product can have.
        - name: minProtein
          in: query
          type: number
          required: false
          description: The minimum amount of protein in grams the product must have.
        - name: maxProtein
          in: query
          type: number
          required: false
          description: The maximum amount of protein in grams the product can have.
        - name: minFat
          in: query
          type: number
          required: false
          description: The minimum amount of fat in grams the product must have.
        - name: maxFat
          in: query
          type: number
          required: false
          description: The maximum amount of fat in grams the product can have.
        - name: addProductInformation
          in: query
          type: boolean
          required: false
          description: If set to true, you get more information about the products returned.
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: null
          in: null
          type: string
          required: false
          description: null
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-products-upc-upc
      path: /food/products/upc/{upc}
      operations:
      - name: searchGroceryProductsByUPC
        method: GET
        description: Search Grocery Products by UPC
        inputParameters:
        - name: upc
          in: path
          type: string
          required: true
          description: The product's UPC.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-products-id
      path: /food/products/{id}
      operations:
      - name: getProductInformation
        method: GET
        description: Get Product Information
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The id of the packaged food.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-products-upc-upc-comparable
      path: /food/products/upc/{upc}/comparable
      operations:
      - name: getComparableProducts
        method: GET
        description: Get Comparable Products
        inputParameters:
        - name: upc
          in: path
          type: string
          required: true
          description: The UPC of the product for which you want to find comparable products.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-products-suggest
      path: /food/products/suggest
      operations:
      - name: autocompleteProductSearch
        method: GET
        description: Autocomplete Product Search
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
          description: The (partial) search query.
        - name: number
          in: query
          type: integer
          required: false
          description: The number of results to return (between 1 and 25).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-products-id-nutritionwidget
      path: /food/products/{id}/nutritionWidget
      operations:
      - name: visualizeProductNutritionByID
        method: GET
        description: Product Nutrition by ID Widget
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The id of the product.
        - name: null
          in: null
          type: string
          required: false
          description: null
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-products-id-nutritionwidget-png
      path: /food/products/{id}/nutritionWidget.png
      operations:
      - name: productNutritionByIDImage
        method: GET
        description: Product Nutrition by ID Image
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The id of the product.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-products-id-nutritionlabel
      path: /food/products/{id}/nutritionLabel
      operations:
      - name: productNutritionLabelWidget
        method: GET
        description: Product Nutrition Label Widget
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The product id.
        - name: null
          in: null
          type: string
          required: false
          description: null
        - name: showOptionalNutrients
          in: query
          type: boolean
          required: false
          description: Whether to show optional nutrients.
        - name: showZeroValues
          in: query
          type: boolean
          required: false
          description: Whether to show zero values.
        - name: showIngredients
          in: query
          type: boolean
          required: false
          description: Whether to show a list of ingredients.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-products-id-nutritionlabel-png
      path: /food/products/{id}/nutritionLabel.png
      operations:
      - name: productNutritionLabelImage
        method: GET
        description: Product Nutrition Label Image
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: The product id.
        - name: showOptionalNutrients
          in: query
          type: boolean
          required: false
          description: Whether to show optional nutrients.
        - name: showZeroValues
          in: query
          type: boolean
          required: false
          description: Whether to show zero values.
        - name: showIngredients
          in: query
          type: boolean
          required: false
          description: Whether to show a list of ingredients.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-products-classify
      path: /food/products/classify
      operations:
      - name: classifyGroceryProduct
        method: POST
        description: Classify Grocery Product
        inputParameters:
        - name: locale
          in: query
          type: string
          required: false
          description: The display name of the returned category, supported is en_US (for American English) and en_GB (for British English).
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-products-classifybatch
      path: /food/products/classifyBatch
      operations:
      - name: classifyGroceryProductBulk
        method: POST
        description: Classify Grocery Product Bulk
        inputParameters:
        - name: locale
          in: query
          type: string
          required: false
          description: The display name of the returned category, supported is en_US (for American English) and en_GB (for British English).
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: spoonacular-products-rest
    port: 8080
    description: REST adapter for spoonacular API — Products. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/food/products/search
      name: food-products-search
      description: REST surface for food-products-search.
      operations:
      - method: GET
        name: searchGroceryProducts
        description: Search Grocery Products
        call: spoonacular-products.searchGroceryProducts
        with:
          null: rest.None
          minCalories: rest.minCalories
          maxCalories: rest.maxCalories
          minCarbs: rest.minCarbs
          maxCarbs: rest.maxCarbs
          minProtein: rest.minProtein
          maxProtein: rest.maxProtein
          minFat: rest.minFat
          maxFat: rest.maxFat
          addProductInformation: rest.addProductInformation
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/products/upc/{upc}
      name: food-products-upc-upc
      description: REST surface for food-products-upc-upc.
      operations:
      - method: GET
        name: searchGroceryProductsByUPC
        description: Search Grocery Products by UPC
        call: spoonacular-products.searchGroceryProductsByUPC
        with:
          upc: rest.upc
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/products/{id}
      name: food-products-id
      description: REST surface for food-products-id.
      operations:
      - method: GET
        name: getProductInformation
        description: Get Product Information
        call: spoonacular-products.getProductInformation
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/products/upc/{upc}/comparable
      name: food-products-upc-upc-comparable
      description: REST surface for food-products-upc-upc-comparable.
      operations:
      - method: GET
        name: getComparableProducts
        description: Get Comparable Products
        call: spoonacular-products.getComparableProducts
        with:
          upc: rest.upc
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/products/suggest
      name: food-products-suggest
      description: REST surface for food-products-suggest.
      operations:
      - method: GET
        name: autocompleteProductSearch
        description: Autocomplete Product Search
        call: spoonacular-products.autocompleteProductSearch
        with:
          query: rest.query
          number: rest.number
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/products/{id}/nutrition-widget
      name: food-products-id-nutritionwidget
      description: REST surface for food-products-id-nutritionwidget.
      operations:
      - method: GET
        name: visualizeProductNutritionByID
        description: Product Nutrition by ID Widget
        call: spoonacular-products.visualizeProductNutritionByID
        with:
          id: rest.id
          null: rest.None
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/products/{id}/nutrition-widget-png
      name: food-products-id-nutritionwidget-png
      description: REST surface for food-products-id-nutritionwidget-png.
      operations:
      - method: GET
        name: productNutritionByIDImage
        description: Product Nutrition by ID Image
        call: spoonacular-products.productNutritionByIDImage
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/products/{id}/nutrition-label
      name: food-products-id-nutritionlabel
      description: REST surface for food-products-id-nutritionlabel.
      operations:
      - method: GET
        name: productNutritionLabelWidget
        description: Product Nutrition Label Widget
        call: spoonacular-products.productNutritionLabelWidget
        with:
          id: rest.id
          null: rest.None
          showOptionalNutrients: rest.showOptionalNutrients
          showZeroValues: rest.showZeroValues
          showIngredients: rest.showIngredients
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/products/{id}/nutrition-label-png
      name: food-products-id-nutritionlabel-png
      description: REST surface for food-products-id-nutritionlabel-png.
      operations:
      - method: GET
        name: productNutritionLabelImage
        description: Product Nutrition Label Image
        call: spoonacular-products.productNutritionLabelImage
        with:
          id: rest.id
          showOptionalNutrients: rest.showOptionalNutrients
          showZeroValues: rest.showZeroValues
          showIngredients: rest.showIngredients
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/products/classify
      name: food-products-classify
      description: REST surface for food-products-classify.
      operations:
      - method: POST
        name: classifyGroceryProduct
        description: Classify Grocery Product
        call: spoonacular-products.classifyGroceryProduct
        with:
          locale: rest.locale
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/products/classify-batch
      name: food-products-classifybatch
      description: REST surface for food-products-classifybatch.
      operations:
      - method: POST
        name: classifyGroceryProductBulk
        description: Classify Grocery Product Bulk
        call: spoonacular-products.classifyGroceryProductBulk
        with:
          locale: rest.locale
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spoonacular-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for spoonacular API — Products. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: search-grocery-products
      description: Search Grocery Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-products.searchGroceryProducts
      with:
        null: tools.None
        minCalories: tools.minCalories
        maxCalories: tools.maxCalories
        minCarbs: tools.minCarbs
        maxCarbs: tools.maxCarbs
        minProtein: tools.minProtein
        maxProtein: tools.maxProtein
        minFat: tools.minFat
        maxFat: tools.maxFat
        addProductInformation: tools.addProductInformation
      outputParameters:
      - type: object
        mapping: $.
    - name: search-grocery-products-upc
      description: Search Grocery Products by UPC
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-products.searchGroceryProductsByUPC
      with:
        upc: tools.upc
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product-information
      description: Get Product Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-products.getProductInformation
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-comparable-products
      description: Get Comparable Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-products.getComparableProducts
      with:
        upc: tools.upc
      outputParameters:
      - type: object
        mapping: $.
    - name: autocomplete-product-search
      description: Autocomplete Product Search
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-products.autocompleteProductSearch
      with:
        query: tools.query
        number: tools.number
      outputParameters:
      - type: object
        mapping: $.
    - name: product-nutrition-id-widget
      description: Product Nutrition by ID Widget
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-products.visualizeProductNutritionByID
      with:
        id: tools.id
        null: tools.None
      outputParameters:
      - type: object
        mapping: $.
    - name: product-nutrition-id-image
      description: Product Nutrition by ID Image
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-products.productNutritionByIDImage
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: product-nutrition-label-widget
      description: Product Nutrition Label Widget
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-products.productNutritionLabelWidget
      with:
        id: tools.id
        null: tools.None
        showOptionalNutrients: tools.showOptionalNutrients
        showZeroValues: tools.showZeroValues
        showIngredients: tools.showIngredients
      outputParameters:
      - type: object
        mapping: $.
    - name: product-nutrition-label-image
      description: Product Nutrition Label Image
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-products.productNutritionLabelImage
      with:
        id: tools.id
        showOptionalNutrients: tools.showOptionalNutrients
        showZeroValues: tools.showZeroValues
        showIngredients: tools.showIngredients
      outputParameters:
      - type: object
        mapping: $.
    - name: classify-grocery-product
      description: Classify Grocery Product
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: spoonacular-products.classifyGroceryProduct
      with:
        locale: tools.locale
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: classify-grocery-product-bulk
      description: Classify Grocery Product Bulk
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: spoonacular-products.classifyGroceryProductBulk
      with:
        locale: tools.locale
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
