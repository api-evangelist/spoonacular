naftiko: 1.0.0-alpha2
info:
  label: spoonacular API — Wine
  description: 'Wine surface of the Spoonacular Food API. 4 operations. Lead operation: Dish Pairing for Wine. Self-contained Naftiko capability covering one Spoonacular business surface.'
  tags:
  - Spoonacular
  - Food
  - Wine
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SPOONACULAR_API_KEY: SPOONACULAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: spoonacular-wine
    baseUri: https://api.spoonacular.com
    description: spoonacular API — Wine business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.SPOONACULAR_API_KEY}}'
      placement: header
    resources:
    - name: food-wine-dishes
      path: /food/wine/dishes
      operations:
      - name: getDishPairingForWine
        method: GET
        description: Dish Pairing for Wine
        inputParameters:
        - name: wine
          in: query
          type: string
          required: true
          description: The type of wine that should be paired, e.g. "merlot", "riesling", or "malbec".
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-wine-pairing
      path: /food/wine/pairing
      operations:
      - name: getWinePairing
        method: GET
        description: Wine Pairing
        inputParameters:
        - name: food
          in: query
          type: string
          required: true
          description: The food to get a pairing for. This can be a dish ("steak"), an ingredient ("salmon"), or a cuisine ("italian").
        - name: maxPrice
          in: query
          type: number
          required: false
          description: The maximum price for the specific wine recommendation in USD.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-wine-description
      path: /food/wine/description
      operations:
      - name: getWineDescription
        method: GET
        description: Wine Description
        inputParameters:
        - name: wine
          in: query
          type: string
          required: true
          description: The name of the wine that should be paired, e.g. "merlot", "riesling", or "malbec".
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: food-wine-recommendation
      path: /food/wine/recommendation
      operations:
      - name: getWineRecommendation
        method: GET
        description: Wine Recommendation
        inputParameters:
        - name: wine
          in: query
          type: string
          required: true
          description: The type of wine to get a specific product recommendation for.
        - name: maxPrice
          in: query
          type: number
          required: false
          description: The maximum price for the specific wine recommendation in USD.
        - name: minRating
          in: query
          type: number
          required: false
          description: The minimum rating of the recommended wine between 0 and 1. For example, 0.8 equals 4 out of 5 stars.
        - name: number
          in: query
          type: number
          required: false
          description: The number of wine recommendations expected (between 1 and 100).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: spoonacular-wine-rest
    port: 8080
    description: REST adapter for spoonacular API — Wine. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/food/wine/dishes
      name: food-wine-dishes
      description: REST surface for food-wine-dishes.
      operations:
      - method: GET
        name: getDishPairingForWine
        description: Dish Pairing for Wine
        call: spoonacular-wine.getDishPairingForWine
        with:
          wine: rest.wine
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/wine/pairing
      name: food-wine-pairing
      description: REST surface for food-wine-pairing.
      operations:
      - method: GET
        name: getWinePairing
        description: Wine Pairing
        call: spoonacular-wine.getWinePairing
        with:
          food: rest.food
          maxPrice: rest.maxPrice
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/wine/description
      name: food-wine-description
      description: REST surface for food-wine-description.
      operations:
      - method: GET
        name: getWineDescription
        description: Wine Description
        call: spoonacular-wine.getWineDescription
        with:
          wine: rest.wine
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/food/wine/recommendation
      name: food-wine-recommendation
      description: REST surface for food-wine-recommendation.
      operations:
      - method: GET
        name: getWineRecommendation
        description: Wine Recommendation
        call: spoonacular-wine.getWineRecommendation
        with:
          wine: rest.wine
          maxPrice: rest.maxPrice
          minRating: rest.minRating
          number: rest.number
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spoonacular-wine-mcp
    port: 9090
    transport: http
    description: MCP adapter for spoonacular API — Wine. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: dish-pairing-wine
      description: Dish Pairing for Wine
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-wine.getDishPairingForWine
      with:
        wine: tools.wine
      outputParameters:
      - type: object
        mapping: $.
    - name: wine-pairing
      description: Wine Pairing
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-wine.getWinePairing
      with:
        food: tools.food
        maxPrice: tools.maxPrice
      outputParameters:
      - type: object
        mapping: $.
    - name: wine-description
      description: Wine Description
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-wine.getWineDescription
      with:
        wine: tools.wine
      outputParameters:
      - type: object
        mapping: $.
    - name: wine-recommendation
      description: Wine Recommendation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spoonacular-wine.getWineRecommendation
      with:
        wine: tools.wine
        maxPrice: tools.maxPrice
        minRating: tools.minRating
        number: tools.number
      outputParameters:
      - type: object
        mapping: $.
