capability:
  workflows:
  - name: spoonacular API — Ingredients
    file: capabilities/spoonacular-ingredients.yaml
    description: 'Ingredients surface of the Spoonacular Food API. 9 operations. Lead operation: Ingredients by ID Image. Self-contained Naftiko capability covering one Spoonacular business surface.'
