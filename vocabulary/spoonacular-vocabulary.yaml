    toolCount: 9
    domains:
    - Ingredients
  - name: spoonacular API — Meal Planning
    file: capabilities/spoonacular-meal-planning.yaml
    description: 'Meal Planning surface of the Spoonacular Food API. 14 operations. Lead operation: Generate Meal Plan. Self-contained Naftiko capability covering one Spoonacular business surface.'
