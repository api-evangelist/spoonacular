  personas:
  - id: app-developer
    name: Application Developer
    description: Builds recipe, nutrition, and meal-planning features into consumer apps.
    workflows:
    - spoonacular API — Meal Planning
    - spoonacular API — Recipes
  - id: nutrition-analyst
    name: Nutrition Analyst
    description: Analyzes ingredients, products, and menu items for nutritional data.
    workflows:
    - spoonacular API — Ingredients
    - spoonacular API — Menu Items
    - spoonacular API — Products
  - id: ai-agent
    name: AI Agent
    description: Calls Spoonacular through MCP tools to answer food and recipe questions.
    workflows:
